name: Build and Release

on:
  workflow_dispatch:
    inputs:
      force_version:
        description: "Force a specific version (skip semantic-release analysis, e.g. v1.3.0)"
        required: false
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  determine-version:
    name: Determine Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      released: ${{ steps.version.outputs.released }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Configure git for push
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh auth setup-git

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Determine version
        id: version
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -n "${{ inputs.force_version }}" ]; then
            VERSION="${{ inputs.force_version }}"
            VERSION=${VERSION#v}
            VERSION=${VERSION#.}
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=v.$VERSION" >> "$GITHUB_OUTPUT"
          else
            NEXT_VERSION=$(npx semantic-release --dry-run --no-ci 2>&1 | grep -oP 'The next release version is \K[0-9]+\.[0-9]+\.[0-9]+' || echo "")
            if [ -z "$NEXT_VERSION" ]; then
              echo "No release needed"
              echo "released=false" >> "$GITHUB_OUTPUT"
              echo "version=" >> "$GITHUB_OUTPUT"
              echo "tag=" >> "$GITHUB_OUTPUT"
            else
              echo "released=true" >> "$GITHUB_OUTPUT"
              echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
              echo "tag=v.$NEXT_VERSION" >> "$GITHUB_OUTPUT"
            fi
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: determine-version
    if: needs.determine-version.outputs.released == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../chronova-cli-${{ needs.determine-version.outputs.tag }}-${{ matrix.target }}.tar.gz chronova-cli
          cd ../../..
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path chronova-cli.exe -DestinationPath ../../../chronova-cli-${{ needs.determine-version.outputs.tag }}-${{ matrix.target }}.zip
          cd ../../..
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chronova-cli-${{ matrix.target }}
          path: |
            chronova-cli-${{ needs.determine-version.outputs.tag }}-${{ matrix.target }}.*
          if-no-files-found: error

  release:
    name: Create Release
    needs: [determine-version, build]
    if: needs.determine-version.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Configure git for push
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh auth setup-git

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: chronova-cli-*

      - name: Collect release files
        run: |
          mkdir release
          find artifacts -name "chronova-cli-*" -exec cp {} release/ \;
          ls -la release/

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release (create tag + GitHub release)
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: npx semantic-release

      - name: Upload binaries to release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          TAG="${{ needs.determine-version.outputs.tag }}"
          for file in release/*; do
            gh release upload "$TAG" "$file" --clobber --repo "${{ github.repository }}"
          done

      - name: Bump version in Cargo.toml
        run: |
          VERSION="${{ needs.determine-version.outputs.version }}"
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml
          cargo update --workspace
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git"
          git pull --rebase origin main
          git add Cargo.toml Cargo.lock
          git commit -m "chore(release): bump version to ${{ needs.determine-version.outputs.tag }}" || true
          git push
